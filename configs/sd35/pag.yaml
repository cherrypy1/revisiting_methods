# SD3.5-medium, Perturbed Attention Guidance (built-in diffusers).
# L13 + pag_scale=3.0 + cfg=4.5 chosen via visual sweep over (1, 3, 13) × (cfg=4.5/6, pag=2/3/5).
# `pag_applied_layers` is a CONSTRUCTOR arg of StableDiffusion3PAGPipeline, not a
# __call__ kwarg, so it lives in the factory (pipelines/sd35/pag.py) defaulting to
# the end-anchored joint-attn regex `transformer_blocks\.13\.attn$` (NOT image-self
# `attn2`, which lacks encoder_hidden_states). Keep it OUT of generation_params.
pipeline: pipelines.sd35.pag
generation_params:
  num_inference_steps: 25
  guidance_scale: 4.5
  pag_scale: 3.0
