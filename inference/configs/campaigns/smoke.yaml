# Tiny end-to-end campaign for validating the orchestrator (P3).
# 6 geneval prompts (1/tag-ish), sd35/cfg, one auto-allocated 1-GPU job.
name: smoke
models: [sd35]
configs: [cfg]
benchmarks: [geneval]
samples_per_prompt: {geneval: 1}
limit: {geneval: 6}
sample_seed: 0
seed: 0
pool:
  partition: rocky
  gpu_type: v100
  gpus_per_job: 1
  cpus_per_gpu: 6
  walltime: "1:00:00"
  max_jobs: 1
verbose: false
