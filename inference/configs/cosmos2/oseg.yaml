# Cosmos-Predict2-2B, OSEG + CFG.
pipeline: pipelines.cosmos2.oseg
generation_params:
  height: 1024
  width: 1024
  num_inference_steps: 35
  guidance_scale: 3.0
  method: oseg
  seg_scale: 2.0
  oseg_scale: 0.5
  seg_blur_sigma: 1.0e+10  # YAML 1.1 needs explicit exp sign, else parsed as str
  seg_applied_layers: [8]
