# Full benchmarking campaign: all guidance methods × both models × all benchmarks.
# config names that don't exist for a model are skipped automatically (e.g. sd35 has
# seg_sigma10_cfg3, cosmos2 has seg_sigma10). Omit `limit` for the full prompt sets;
# add e.g. `limit: {geneval: 60, oneig: 30, dpg: 90}` for a fast pass.
name: main
models: [sd35, cosmos2]
configs:
  - no_cfg
  - cfg
  - cfgpp
  - cfg0s
  - apg
  - tcfg
  - sag
  - oseg
  - pag
  - seg_sigma10_cfg3   # sd35
  - seg_sigma10         # cosmos2
benchmarks: [geneval, oneig, dpg]
samples_per_prompt: {geneval: 1, oneig: 1, dpg: 1}
seed: 0
sample_seed: 0
pool:
  partition: rocky
  gpu_type: v100
  gpus_per_job: 1
  cpus_per_gpu: 6
  walltime: "12:00:00"
  max_jobs: 4
verbose: false
