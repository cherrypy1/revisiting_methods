# SD3.5 benchmark on 1/3 of prompts per category, all 10 methods, CORRECTED pipeline
# (method dispatch + per-method fixes: cfg0s/apg/tcfg/sag/cfgpp/oseg). Stratified
# subsample (seeded) gives ~1/3 of each category. Optimal params live in configs/sd35/*.
name: sd35_third
models: [sd35]
configs:
  - no_cfg
  - cfg
  - cfgpp
  - cfg0s
  - apg
  - tcfg
  - sag
  - oseg
  - pag
  - seg_sigma10_cfg3
benchmarks: [geneval, oneig, dpg]
samples_per_prompt: {geneval: 1, oneig: 1, dpg: 1}
limit: {geneval: 184, oneig: 210, dpg: 355}   # ~1/3 of 553 / 631 / 1065
seed: 0
sample_seed: 0
pool:
  partition: rocky
  gpu_type: v100
  gpus_per_job: 1
  cpus_per_gpu: 6
  walltime: "30:00:00"
  max_jobs: 4
verbose: false
