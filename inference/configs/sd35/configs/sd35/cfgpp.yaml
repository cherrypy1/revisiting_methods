# SD3.5-medium, CFG++ (flow-matching reparam, w in [~0.5, ~1.3]).
# Note: `guidance_scale` here is the CFG++ mixing coefficient `w`, NOT classical
# CFG scale. Using >>1 produces burnout artifacts (verified empirically).
pipeline: pipelines.sd35.cfgpp
generation_params:
  method: cfgpp
  num_inference_steps: 25
  guidance_scale: 0.75
